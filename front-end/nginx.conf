server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that isn't a real file gets served index.html
    # so React Router handles it on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS/CSS bundles have content-hash filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — it must always be fresh
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
