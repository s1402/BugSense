name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'back-end/**'
              - '.github/workflows/cd.yml'
            frontend:
              - 'front-end/**'
              - '.github/workflows/cd.yml'

  deploy-backend:
    name: Deploy back-end to Render
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          response=$(curl -fsSL -w "\n%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $response"

  deploy-frontend:
    name: Deploy front-end to Vercel
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Vercel builders handle the build)
        # Run from repo root. Vercel project config has `front-end` as root directory;
        # running `vercel` here would double-append it.
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  cd-passed:
    name: CD passed
    needs: [detect-changes, deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any deploy failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - name: Success
        run: echo "Production deploy complete."
